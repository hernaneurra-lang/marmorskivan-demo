<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Oj då – något gick fel</title>
    <style>
      body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; background:#fff; color:#111; }
      .hero {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
        background: linear-gradient(180deg, #f6f7f8 0%, #ffffff 60%);
      }
      .card {
        width: min(720px, 100%);
        border: 1px solid #e5e7eb;
        border-radius: 20px;
        background: #fff;
        padding: 28px;
        box-shadow: 0 10px 30px rgba(0,0,0,.06);
      }
      h1 { margin: 0 0 10px; font-size: 28px; }
      p { margin: 0 0 18px; color: #4b5563; line-height: 1.5; }
      .btn {
        display:inline-block;
        padding: 12px 16px;
        border-radius: 14px;
        background: #059669;
        color: #fff;
        text-decoration: none;
        font-weight: 700;
      }
      .small { font-size: 12px; color:#9ca3af; margin-top: 14px; }
    </style>
    <script>
      // Om någon landar här på en SPA-route: skicka tillbaka till startsidan
      // (Du kan ändra "/" till "/?from404=1" om du vill logga/visa notis)
      setTimeout(() => { window.location.replace("/"); }, 800);
    </script>
  </head>
  <body>
    <div class="hero">
      <div class="card">
        <h1>Oj då – något gick fel</h1>
        <p>
          Sidan kunde inte laddas som den ska. Klicka nedan så tar vi dig tillbaka till startsidan.
        </p>
        <a class="btn" href="/">Tillbaka till Marmorskivan.se</a>
        <div class="small">Du omdirigeras automatiskt inom en sekund…</div>
      </div>
    </div>
  </body>
</html>
